<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>App Index - Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary": "#ffffff",
              "inverse-primary": "#a5b4fc",
              "surface-container-low": "#e5e7ed",
              "on-background": "#2e3040",
              "inverse-surface": "#2e3040",
              "on-tertiary-fixed": "#2e1065",
              background: "#e8eaf0",
              "primary-fixed-dim": "#a5b4fc",
              "surface-container-lowest": "#f0f2f8",
              "on-surface-variant": "#585a68",
              "surface-bright": "#edeef4",
              "on-secondary-fixed": "#1a1b26",
              surface: "#e8eaf0",
              "surface-dim": "#d4d6dc",
              "surface-container": "#e2e4ea",
              "on-tertiary-fixed-variant": "#5b21b6",
              "surface-variant": "#dcdee4",
              outline: "#8a8c9a",
              secondary: "#6c6e7e",
              "on-primary": "#ffffff",
              "on-secondary-fixed-variant": "#404252",
              "on-primary-fixed-variant": "#4338ca",
              "outline-variant": "#d0d2dc",
              "on-primary-container": "#e0e2ff",
              "surface-tint": "#6366f1",
              "surface-container-high": "#dcdee4",
              "secondary-fixed": "#d8dae6",
              "tertiary-fixed-dim": "#c4b5fd",
              "on-primary-fixed": "#1e1b4b",
              error: "#dc2626",
              "secondary-container": "#d8dae6",
              primary: "#6366f1",
              "error-container": "#fee2e2",
              "primary-container": "#818cf8",
              "on-error-container": "#991b1b",
              "on-error": "#ffffff",
              "tertiary-container": "#a78bfa",
              "surface-container-highest": "#d6d8de",
              "on-surface": "#2e3040",
              "on-tertiary-container": "#3b1f63",
              "secondary-fixed-dim": "#b8baca",
              "primary-fixed": "#e0e2ff",
              "on-secondary-container": "#585a68",
              "inverse-on-surface": "#e8eaf0",
              tertiary: "#7c3aed",
              "tertiary-fixed": "#ede9fe",
              "on-secondary": "#ffffff",
            },
            fontFamily: {
              headline: ["Plus Jakarta Sans"],
              body: ["Plus Jakarta Sans"],
              label: ["Plus Jakarta Sans"],
            },
            borderRadius: {
              DEFAULT: "0.5rem",
              lg: "1rem",
              xl: "1.5rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      body {
        background-color: #e8eaf0;
        font-family: "Plus Jakarta Sans", sans-serif;
      }
      .neo-raised {
        box-shadow:
          6px 6px 12px rgba(0, 0, 0, 0.08),
          -6px -6px 12px rgba(255, 255, 255, 0.6);
        background-color: #e8eaf0;
      }
      .neo-inset {
        box-shadow:
          inset 4px 4px 8px rgba(0, 0, 0, 0.06),
          inset -4px -4px 8px rgba(255, 255, 255, 0.5);
        background-color: #e8eaf0;
      }
      .neo-button:active {
        box-shadow:
          inset 4px 4px 8px rgba(0, 0, 0, 0.06),
          inset -4px -4px 8px rgba(255, 255, 255, 0.5);
      }
      .neo-tile:hover {
        box-shadow:
          8px 8px 16px rgba(99, 102, 241, 0.2),
          -8px -8px 16px rgba(255, 255, 255, 0.8);
      }
      .status-glow {
        text-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
      }
      .mask-linear-gradient {
        mask-image: linear-gradient(to right, transparent, black);
      }
    </style>
  </head>
  <body class="flex min-h-screen">
    <main class="flex-1 flex flex-col p-4 pr-6">
      <!-- TopNavBar -->
      <header
        class="neo-raised rounded-xl p-4 mb-6 flex items-center justify-between"
      >
        <div class="flex items-center gap-4">
          <span class="text-on-surface font-headline font-bold text-lg"
            >App Index</span
          >
        </div>
        <div class="flex items-center gap-6">
          <div
            class="neo-inset px-4 py-2 rounded-full flex items-center gap-2 w-64"
          >
            <span
              class="material-symbols-outlined text-outline"
              data-icon="search"
              >search</span
            >
            <input
              class="bg-transparent border-none focus:ring-0 text-sm text-on-surface w-full"
              placeholder="Search applications..."
              type="text"
            />
          </div>
          <div class="flex gap-3">
            <button
              class="w-10 h-10 neo-raised rounded-full flex items-center justify-center text-on-surface-variant hover:text-primary"
            >
              <span class="material-symbols-outlined" data-icon="settings"
                >settings</span
              >
            </button>
            <button
              class="w-10 h-10 neo-raised rounded-full flex items-center justify-center text-on-surface-variant hover:text-primary"
            >
              <span class="material-symbols-outlined" data-icon="account_circle"
                >account_circle</span
              >
            </button>
          </div>
        </div>
      </header>
      <!-- Status Area -->
      <div
        class="neo-inset rounded-xl p-6 mb-8 flex items-center justify-between"
      >
        <div class="flex items-center gap-4">
          <div
            class="w-3 h-3 bg-primary rounded-full animate-pulse shadow-[0_0_8px_rgba(99,102,241,0.6)]"
          ></div>
          <p class="text-on-surface font-medium status-glow" id="status-text">
            System Ready. Select an application to begin.
          </p>
        </div>
        <div
          class="text-on-surface-variant text-sm font-mono"
          id="clock-display"
        >
          09:41 AM — ONLINE
        </div>
      </div>
      <!-- App Grid (Balanced 4x4 Grid) -->
      <div
        class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 auto-rows-[160px]"
      >
        <!-- Mail -->
        <div
          class="neo-raised neo-tile rounded-xl p-6 flex flex-col justify-between group cursor-pointer transition-all duration-300"
          onclick="launchApp('Mail')"
        >
          <div class="flex justify-between items-start">
            <span
              class="material-symbols-outlined text-4xl text-primary"
              data-icon="mail"
              >mail</span
            >
            <button
              class="neo-raised neo-button text-[10px] font-bold px-2 py-1 rounded text-on-surface-variant hover:text-primary"
              onclick="
                event.stopPropagation();
                setDefault('Mail');
              "
            >
              SET DEFAULT
            </button>
          </div>
          <div>
            <h3 class="text-on-surface font-semibold text-lg">Mail</h3>
            <p class="text-on-surface-variant text-xs">4 Unread Messages</p>
          </div>
        </div>
        <!-- Browser -->
        <div
          class="neo-raised neo-tile rounded-xl p-6 flex flex-col justify-between group cursor-pointer transition-all duration-300"
          onclick="launchApp('Browser')"
        >
          <div class="flex justify-between items-start">
            <span
              class="material-symbols-outlined text-4xl text-tertiary"
              data-icon="language"
              >language</span
            >
            <button
              class="neo-raised neo-button text-[10px] font-bold px-2 py-1 rounded text-on-surface-variant hover:text-tertiary"
              onclick="
                event.stopPropagation();
                setDefault('Browser');
              "
            >
              SET DEFAULT
            </button>
          </div>
          <div>
            <h3 class="text-on-surface font-semibold text-lg">Browser</h3>
            <p class="text-on-surface-variant text-xs">Chrome 119</p>
          </div>
        </div>
      </div>
    </main>
    <script>
      function launchApp(appName) {
        const statusText = document.getElementById("status-text");
        statusText.innerText = `Launching ${appName}...`;
        statusText.classList.add("text-primary");

        // Visual feedback loop
        setTimeout(() => {
          statusText.classList.remove("text-primary");
          statusText.innerText = `${appName} is now running in the background.`;
        }, 3000);

        console.log(`System: Executing launch process for ${appName}`);
      }

      function setDefault(appName) {
        localStorage.setItem("defaultApp", appName);
        const statusText = document.getElementById("status-text");
        statusText.innerText = `${appName} set as default startup application.`;

        // Visual confirmation
        const btn = event.currentTarget;
        btn.innerText = "SAVED";
        btn.classList.add("text-tertiary");
        setTimeout(() => {
          btn.innerText = "SET DEFAULT";
          btn.classList.remove("text-tertiary");
        }, 2000);
      }

      window.onload = function () {
        const defaultApp = localStorage.getItem("defaultApp");
        if (defaultApp) {
          launchApp(defaultApp);
          const statusText = document.getElementById("status-text");
          statusText.innerText = `Auto-launching default: ${defaultApp}...`;
        }

        // Simple clock update
        setInterval(() => {
          const now = new Date();
          const timeStr = now.toLocaleTimeString([], {
            hour: "2-digit",
            minute: "2-digit",
          });
          const display = document.getElementById("clock-display");
          if (display) display.innerText = `${timeStr} — ONLINE`;
        }, 1000);
      };
    </script>
  </body>
</html>
