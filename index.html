<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>React + TS + Tailwind (SystemJS)</title>
  <link rel="stylesheet" href="./main.css" />
  <script src="assets/scripts/system.min.js"></script>
  <script src="assets/scripts/system.fetch.js"></script>
  <script src="assets/scripts/systemjs-babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/systemjs/dist/extras/global.min.js"></script>
</head>

<body>
  <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@latest",
          "react-dom": "https://esm.sh/react-dom@latest",
          "react-dom/client": "https://esm.sh/react-dom@latest/client",
          "react/jsx-runtime": "https://esm.sh/react@latest/jsx-runtime",
          "@mui/material": "https://esm.sh/@mui/material@latest?external=react,react-dom"
        }
      }
  </script>

  <script type="module" src="https://esm.sh/tsx"></script>
  <div id="app">
    <div id="loading-overlay" class="_main-loader-screen">
      <div class="_main-loader-content">
        <h1 class="_main-title">App Index</h1>

        <div class="_main-visual-wrapper">
          <div class="_main-glown-ring"></div>
          <div class="_main-red-spinner"></div>
        </div>

        <div class="_main-status-container">
          <p class="_main-status-text">LOADING ESM MODULE</p>
          <div class="_main-subtext">ESTABLISHING APPLICATION</div>
        </div>
      </div>
    </div>
  </div>
  <script>
    System.import("./src/html/main/main.js").then(() => {
      System.import("./src/html/main/main.fab.js");
    });
  </script>

</html>
